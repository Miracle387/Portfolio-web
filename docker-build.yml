name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t miracle387/portfolio:${{ github.sha }} .
          docker tag miracle387/portfolio:${{ github.sha }} miracle387/portfolio:2

      - name: Push Docker image
        run: |
          docker push miracle387/portfolio:${{ github.sha }}
          docker push miracle387/portfolio:v2 .